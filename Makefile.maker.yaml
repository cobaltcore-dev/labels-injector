metadata:
  url: https://github.com/cobaltcore-dev/labels-injector

binaries:
  - name: manager
    fromPackage: ./cmd
    installTo: bin/

golang:
  autoupdateDependencies:
    enabled: true
    matchModule: ^github.com/(?:sapcc|sap-cloud-infrastructure)/
  setGoModVersion: true

golangciLint:
  createConfig: true

githubWorkflow:
  ci:
    enabled: true
    prepareMakeTarget: generate
  global:
    defaultBranch: main
  securityChecks:
    enabled: true
    queries: security-extended
  pushContainerToGhcr:
    enabled: true
    platforms: "linux/amd64"
    tagStrategy:
      - latest
      - semver
      - sha
  pushHelmChartToGhcr:
    path: charts/labels-injector
  license:
    enabled: true

renovate:
  enabled: true
  assignees:
    - notandy
    - fwiesel
    - mchristianl
    - toanju

reuse:
  enabled: true
  annotations:
    - paths:
        - config/**.yaml
        - charts/**
        - PROJECT
        - build/**
      SPDX-FileCopyrightText: 'SAP SE or an SAP affiliate company'
      SPDX-License-Identifier: Apache-2.0

dockerfile:
  enabled: true

controllerGen:
  enabled: true
  crdOutputPath: config/crd/bases
  objectHeaderFile: hack/boilerplate.go.txt
  rbacRoleName: manager-role
